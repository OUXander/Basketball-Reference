<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NBA Awards</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
    <main class="main-content">
        <div class="search-section">
            <a href="{{ url_for('index') }}" class="back-link top-back">← Back</a>

            <h1>NBA Awards</h1>

            <form method="GET" action="{{ url_for('awardsPage') }}" class="season-selector-form">
                <label for="season-select" class="season-selector-label">Season</label>
                <select id="season-select" name="season" class="season-selector" onchange="this.form.submit()">
                    {% for s in available_seasons %}
                        <option value="{{ s }}" {% if s == selected_season %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </form>

            <p class="results-label">{{ selected_season }} Regular Season &amp; Playoffs</p>

            <div class="awards-grid">
                {% for award in award_list %}
                <div class="award-card">
                    {% if award.headshot_url %}
                    <img
                        class="award-headshot"
                        src="{{ award.headshot_url }}"
                        alt="{{ award.name }}"
                        onerror="this.style.display='none'"
                    >
                    {% endif %}
                    <div class="award-card-info">
                        <div class="award-card-label">{{ award.label }}</div>
                        <a href="{{ url_for('playerPage', name=award.name) }}" class="award-winner-name">
                            {{ award.name }}
                        </a>
                        <div class="award-winner-team">{{ award.team }}</div>
                    </div>
                </div>
                {% endfor %}
            </div>

        </div>
    </main>
</div>

</body>
</html>
