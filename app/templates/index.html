<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Basketball Reference Redesign</title>
		<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
		<script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>	
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
	</head>

	<body>
		<div class="app">

			<aside id="sidebar">
				<button id="sidebar-close" onclick="closeSidebar()"><i class="fa fa-close"></i></button>  

				<div class="sidebar-header">
					<h2>Explore</h2>
				</div>

				<nav class="sidebar-nav">
					<a href="#">Advanced Stats</a>
					<a href="#">Historical Leaders</a>
					<a href="#">Awards</a>
					<a href="#">Playoff Records</a>
					<a href="#">Draft Finder</a>
					<a href="#">Season Finder</a>
					<a href="#">Franchise History</a>
				</nav>
			</aside>

			<main class="main-content">
				<button id="sidebar-open" onclick="openSidebar()"><i class="fa fa-bars"></i></button>  
				<div class="header">
					<img src="img/logo.png" alt="Basketball Reference" class="logo">
				</div>

				<div class="search-section">
					<h1>Search for a team or player to get started!</h1>
					<input type="text" placeholder="Start typing here" class="search-bar">
				</div>

				<div class="nav">
					<a href="#">Players</a>
					<a href="#">Teams</a>
					<a href="#">Stats</a>
					<a href="#">Leaders</a>
					<a href="#">Standings</a>
				</div>
			</main>
		</div>
	</body>
</html>
